{% extends 'base.html' %}
{% load static %}

{% block title %}Login - HRMS Portal{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <!-- Auth Header -->
        <div class="auth-header">
            <a href="{% url 'landing_page' %}" class="auth-logo">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
                    <line x1="8" y1="22" x2="56" y2="22" stroke="currentColor" stroke-width="2"/>
                    <circle cx="20" cy="17" r="2" fill="currentColor"/>
                    <circle cx="28" cy="17" r="2" fill="currentColor"/>
                    <circle cx="36" cy="17" r="2" fill="currentColor"/>
                    <rect x="16" y="30" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <line x1="36" y1="32" x2="48" y2="32" stroke="currentColor" stroke-width="2"/>
                    <line x1="36" y1="38" x2="44" y2="38" stroke="currentColor" stroke-width="2"/>
                    <line x1="36" y1="44" x2="48" y2="44" stroke="currentColor" stroke-width="2"/>
                </svg>
            </a>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your HRMS Portal account</p>
        </div>
        
        <!-- Login Form -->
        <div class="auth-card">
            <form method="post" action="{% url 'login' %}" class="auth-form" id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_username" class="form-label">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        name="username" 
                        id="id_username" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label for="id_password" class="form-label">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Password
                    </label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            name="password" 
                            id="id_password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('id_password')">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" class="checkbox-input">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full btn-large">
                    <span>Sign In</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                </button>
            </form>
        </div>
        
        <!-- Auth Footer -->
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}" class="auth-link">Register here</a></p>
            <a href="{% url 'landing_page' %}" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Toggle password visibility
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const button = input.nextElementSibling;
        
        if (input.type === 'password') {
            input.type = 'text';
            button.classList.add('showing');
        } else {
            input.type = 'password';
            button.classList.remove('showing');
        }
    }
    
    // Form validation
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const email = document.getElementById('id_username').value.trim();
        const password = document.getElementById('id_password').value;
        
        if (!email) {
            e.preventDefault();
            showMessage('Please enter your email address.', 'error');
            return false;
        }
        
        if (!password) {
            e.preventDefault();
            showMessage('Please enter your password.', 'error');
            return false;
        }
        
        return true;
    });
</script>
{% endblock %}
